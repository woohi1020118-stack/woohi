<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body {
  background: transparent;
  overflow: hidden;
  width: 700px; height: 120px;
}

.bar {
  display: inline-flex;
  align-items: center;
  height: 90px;
  margin: 15px 0 0 10px;
  border-radius: 50px;
  padding: 0 20px 0 6px;
  gap: 0;
  /* 크로마키 깨짐 방지: box-shadow 없음, 순수 rgba 배경 */
  background: rgba(255, 255, 255, 0.82);
  border: 1.5px solid rgba(168, 230, 207, 0.7);
  opacity: 0;
  transition: opacity .5s ease, width .35s ease;
  max-width: 460px; /* 기본 최대 2/3 ≈ 466px */
}
.bar.visible { opacity: 1; }

/* 프로필 이미지 */
.profile-wrap { flex-shrink: 0; z-index: 2; }
.profile-bg {
  width: 78px; height: 78px; border-radius: 50%;
  background: linear-gradient(135deg, #1599f0, #4d8bf0);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.profile-bg img {
  width: 100%; height: 100%;
  object-fit: cover; border-radius: 50%;
}

/* 텍스트 영역 */
.song-info {
  overflow: hidden;
  padding: 0 14px;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 3px;
}

/* 제목 */
.song-title-wrap {
  white-space: nowrap;
  overflow: hidden;
  max-width: 340px;
}
.song-title-text {
  display: inline-block;
  font-family: 'Pretendard', sans-serif;
  font-size: 20px; font-weight: 700;
  color: #1C1C2E;
  white-space: nowrap;
}

/* 가수 */
.song-artist {
  font-family: 'Pretendard', sans-serif;
  font-size: 12px; font-weight: 500;
  color: #6B7280;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 5px;
}
.artist-name { color: #6B7280; }
.artist-sep { font-size: 10px; opacity: .4; }
.singer-name { color: #0455DC; font-weight: 700; }

/* 롤링 */
@keyframes rolling {
  0%   { transform: translateX(0); }
  100% { transform: translateX(var(--roll-dist)); }
}
</style>
</head>
<body>

<div class="bar" id="bar">
  <div class="profile-wrap">
    <div class="profile-bg">
      <img src="../assets/profile.jpg" alt="우히"
           onerror="this.style.display='none'">
    </div>
  </div>
  <div class="song-info" id="songInfo">
    <div class="song-title-wrap" id="titleWrap">
      <span class="song-title-text" id="titleText">🎵 우히</span>
    </div>
    <div class="song-artist" id="artistText"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://xnknkqvmqntxdwcsqmbj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhua25rcXZtcW50eGR3Y3NxbWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDkwOTYsImV4cCI6MjA5NjgyNTA5Nn0.p_zgPHCauTsSZW24l1XlZxeHrCZzmir0ALSqsrQ-wSc'
);

const MAX_WIDTH = 460; // 최대 2/3 너비
let lastKey = null;
let rollingAnim = null;

function applyRolling(el, wrap) {
  // 초기화
  if (rollingAnim) {
    el.style.animation = 'none';
    el.style.transform = 'translateX(0)';
    rollingAnim = null;
  }
  requestAnimationFrame(() => {
    const overflow = el.scrollWidth - wrap.clientWidth;
    if (overflow > 0) {
      const gap = 60;
      const totalDist = el.scrollWidth + gap;
      const duration = totalDist / 65; // 65px/초
      el.style.setProperty('--roll-dist', `-${totalDist}px`);
      const txt = el.textContent;
      el.innerHTML = `<span>${txt}</span><span style="padding-left:${gap}px">${txt}</span>`;
      el.style.animation = `rolling ${duration}s linear infinite`;
      rollingAnim = true;
    } else {
      el.innerHTML = el.textContent;
      el.style.animation = 'none';
      el.style.transform = 'translateX(0)';
    }
  });
}

function fitBarWidth(titleEl, artistEl) {
  // 제목+가수 중 긴 쪽 기준으로 바 너비 계산 (최대 MAX_WIDTH)
  requestAnimationFrame(() => {
    const bar = document.getElementById('bar');
    const profileW = 78 + 6 + 20; // profile + padding
    const textW = Math.min(
      Math.max(titleEl.scrollWidth, artistEl.scrollWidth) + 28,
      MAX_WIDTH
    );
    bar.style.width = (profileW + textW + 20) + 'px';
  });
}

async function poll() {
  try {
    const { data } = await sb.from('overlay_state').select('*').eq('id', 1).single();
    if (!data) return;

    const bar = document.getElementById('bar');
    if (!data.is_visible || !data.song_title) {
      bar.classList.remove('visible');
      return;
    }

    const key = data.song_title + '|' + data.song_artist;
    if (key === lastKey) { bar.classList.add('visible'); return; }
    lastKey = key;

    const titleEl = document.getElementById('titleText');
    const artistEl = document.getElementById('artistText');
    const titleWrap = document.getElementById('titleWrap');

    // 리셋
    titleEl.style.animation = 'none';
    titleEl.style.transform = 'translateX(0)';
    titleEl.innerHTML = '';
    rollingAnim = null;

    titleEl.textContent = data.song_title;
    const artist = data.song_artist || '';
    artistEl.innerHTML = artist
      ? `<span class="artist-name">${artist}</span><span class="artist-sep">·</span><span class="singer-name">우히</span>`
      : `<span class="singer-name">우히</span>`;

    fitBarWidth(titleEl, artistEl);
    bar.classList.add('visible');
    setTimeout(() => applyRolling(titleEl, titleWrap), 200);
  } catch(e) {}
}

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
