<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우히</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint: #8FBCF2;
    --mint-light: #DCEBFF;
    --mint-pale: #EFF5FF;
    --mint-dark: #1599f0;
    --mint-deep: #0455DC;
    --lavender: #C5B8F0;
    --lavender-light: #EBE6FF;
    --pink-soft: #FFD6EC;
    --white: #FFFFFF;
    --gray-100: #F7F7F7;
    --gray-200: #EEEEEE;
    --gray-400: #BBBBBB;
    --gray-600: #888888;
    --text: #1C1C2E;
    --text-muted: #6B7280;
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'Pretendard', sans-serif; background: var(--white); color: var(--text); min-height: 100vh; }

  /* ─── NAV ─── */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    height: 56px;
  }
  .nav-inner {
    max-width: 900px; margin: 0 auto;
    padding: 0 40px; height: 100%;
    display: flex; align-items: center; gap: 20px;
  }
  .nav-back { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-muted); text-decoration:none; transition:color .2s; }
  .nav-back:hover { color: var(--mint-deep); }
  .nav-back::before { content:'←'; font-size:14px; }
  .nav-title { font-family:'Pretendard',serif; font-size:16px; color:var(--text); }
  .nav-dot { width:5px; height:5px; border-radius:50%; background:var(--mint); }
  /* 우측 nav 링크 */
  .nav-links { display:flex; align-items:center; gap:4px; margin-left:auto; }
  .nav-link {
    padding:5px 13px; border-radius:20px; font-size:12px; font-weight:600;
    text-decoration:none; transition:all .18s;
    color:var(--text-muted); background:none; border:1.5px solid transparent;
  }
  .nav-link:hover { color:var(--mint-deep); background:var(--mint-pale); border-color:var(--mint); }
  .nav-link.active { color:var(--mint-deep); background:var(--mint-pale); border-color:var(--mint); }
  @media(max-width:768px) {
    .nav-links { gap:2px; }
    .nav-link { padding:4px 8px; font-size:11px; }
  }

  /* ─── HEADER ─── */
  .page-header {
    padding: 48px 60px 32px;
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
  }
  .page-eyebrow { font-size:11px; font-weight:500; color:var(--mint-dark); letter-spacing:.25em; text-transform:uppercase; margin-bottom:8px; opacity:.75; }
  .page-title { font-family:'Pretendard',serif; font-size:36px; font-weight:400; color:var(--text); }
  .page-sub { font-size:13px; color:var(--text-muted); margin-top:6px; line-height:1.6; }

  /* ─── SEARCH & FILTER ─── */
  .toolbar {
    max-width: 900px; margin: 0 auto;
    padding: 0 60px 24px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-input {
    width: 100%; padding: 10px 16px 10px 40px;
    border: 1.5px solid var(--gray-200); border-radius: 12px;
    font-size: 14px; font-family: inherit; color: var(--text);
    background: var(--white); outline: none; transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--mint); }
  .search-input::placeholder { color: var(--gray-400); }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:14px; pointer-events:none; }

  .filter-tabs { display:flex; gap:6px; flex-wrap:wrap; }
  .filter-tab {
    font-size:12px; font-weight:500; padding:7px 16px;
    border-radius:20px; border:1.5px solid var(--gray-200);
    background:var(--white); color:var(--text-muted);
    cursor:pointer; transition:all .18s ease; font-family:inherit;
  }
  .filter-tab:hover { border-color:var(--mint); color:var(--mint-deep); }
  .filter-tab.active { background:var(--mint-pale); border-color:var(--mint); color:var(--mint-deep); font-weight:600; }

  /* ─── SONG TABLE ─── */
  .table-wrap {
    max-width: 900px; margin: 0 auto;
    padding: 0 60px 80px;
  }
  .table-box {
    border: 1px solid var(--gray-200); border-radius: 16px;
    overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.04);
  }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  thead { background: var(--mint-pale); }
  thead th {
    padding: 12px 16px; text-align:left; font-size:11px;
    font-weight:700; color:var(--mint-deep); letter-spacing:.1em; text-transform:uppercase;
  }
  thead th.center { text-align:center; }
  tbody tr {
    border-top: 1px solid var(--gray-200);
    transition: background .15s;
  }
  tbody tr:hover { background: var(--mint-pale); }
  tbody td { padding: 12px 16px; color:var(--text); vertical-align:middle; }
  tbody td.center { text-align:center; }
  .artist-cell { font-weight:500; color:var(--text-muted); font-size:13px; }
  .title-cell { font-weight:500; }
  .memo-cell { font-size:12px; color:var(--text-muted); }

  /* 숙련도 별 */
  .stars { display:inline-flex; gap:2px; }
  .star { font-size:14px; }
  .star-on { color: var(--mint-dark); }
  .star-off { color: var(--gray-200); }

  /* 장르 뱃지 */
  .genre-badge {
    font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600;
    display:inline-block;
  }
  .genre-kpop  { background:var(--pink-soft); color:#C05688; }
  .genre-jpop  { background:#FFF4E0; color:#B07A00; }
  .genre-pop   { background:var(--lavender-light); color:#5B4BA8; }
  .genre-indie { background:var(--mint-pale); color:var(--mint-deep); }
  .genre-folk  { background:#F0F7E6; color:#4A8030; }
  .genre-etc   { background:var(--gray-100); color:var(--gray-600); }

  /* 복사 버튼 */
  .copy-btn {
    background: none; border: 1.5px solid var(--gray-200); border-radius:8px;
    padding:4px 10px; font-size:11px; color:var(--gray-600);
    cursor:pointer; transition:all .18s; font-family:inherit;
  }
  .copy-btn:hover { border-color:var(--mint); color:var(--mint-deep); background:var(--mint-pale); }
  .copy-btn.copied { border-color:var(--mint-dark); color:var(--mint-dark); background:var(--mint-light); }

  /* 로딩 / 빈 상태 */
  .state-box { text-align:center; padding:60px 20px; }
  .spinner {
    width:32px; height:32px; border-radius:50%;
    border:3px solid var(--mint-light); border-top-color:var(--mint-dark);
    animation:spin .8s linear infinite; margin:0 auto 16px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .state-text { font-size:14px; color:var(--text-muted); }
  .state-emoji { font-size:32px; margin-bottom:12px; }

  /* count */
  .count-badge {
    font-size:12px; background:var(--mint-pale); border:1px solid var(--mint);
    color:var(--mint-deep); padding:4px 12px; border-radius:20px; font-weight:600;
  }


  /* ─── 스켈레톤 ─── */
  .skeleton-wrap { padding: 0; }
  .skeleton-row {
    display: grid;
    grid-template-columns: 22% 30% 12% 14% 14% 8%;
    border-top: 1px solid var(--gray-200);
    padding: 12px 16px;
    gap: 16px;
    align-items: center;
  }
  .skeleton-row:first-child { border-top: none; }
  .skel {
    height: 14px; border-radius: 6px;
    background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .skel-sm { height: 12px; }
  .skel-badge { height: 20px; border-radius: 20px; width: 60%; }
  .skel-stars { height: 14px; width: 70%; border-radius: 4px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  @keyframes popIn { from{transform:translateY(16px) scale(.97);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }

  /* ─── 페이지네이션 ─── */
  .pagination {
    display:flex; align-items:center; justify-content:center;
    gap:4px; padding:24px 0 8px;
  }
  .page-btn {
    width:34px; height:34px; border-radius:8px;
    border:1.5px solid var(--gray-200); background:var(--white);
    color:var(--text-muted); font-size:13px; font-weight:500;
    cursor:pointer; font-family:inherit; transition:all .15s;
    display:flex; align-items:center; justify-content:center;
  }
  .page-btn:hover { border-color:var(--mint); color:var(--mint-deep); }
  .page-btn.active { background:var(--mint-dark); border-color:var(--mint-dark); color:white; font-weight:700; }
  .page-btn.arrow { font-size:16px; }
  .page-btn:disabled { opacity:.35; cursor:default; pointer-events:none; }

  /* ─── FOOTER ─── */
  footer { text-align:center; padding:30px; font-size:12px; color:var(--gray-400); border-top:1px solid var(--gray-200); }
  footer span { color:var(--mint-dark); }

  /* ─── RESPONSIVE ─── */
  @media (max-width:768px) {
    .page-header { padding:36px 20px 20px; flex-direction:column; align-items:flex-start; }
    .toolbar { padding:0 20px 20px; }
    .table-wrap { padding:0 16px 60px; }
    .nav-inner { padding:0 20px; }
    .memo-cell { display:none; }
  }

  /* ── 우측 세로 탭 내비 (우히) ── */
  .page{display:grid;grid-template-columns:1fr 150px;gap:24px;max-width:1120px;margin:0 auto;padding:0 16px;align-items:start}
  .main{min-width:0}
  footer{grid-column:1/-1}
  .rail{position:sticky;top:24px;align-self:start;padding-top:24px}
  .rail-inner{position:relative;padding-right:14px}
  .rail-inner::before{content:'';position:absolute;top:-8px;bottom:-8px;right:0;width:2.5px;background:var(--mint-deep);border-radius:2px}
  .tab{display:block;margin:0 0 13px auto;width:100px;text-align:center;padding:10px 0;font-size:16px;font-weight:800;color:var(--mint-deep);text-decoration:none;background:#fff;position:relative;border:2.5px solid var(--mint-deep);border-radius:255px 15px 225px 15px/15px 225px 15px 255px;transition:transform .18s,background .18s}
  .tab:nth-child(2n){border-radius:15px 225px 15px 255px/225px 15px 255px 15px}
  .tab:nth-child(3n){border-radius:225px 15px 255px 15px/15px 255px 15px 225px}
  .tab::after{content:'';position:absolute;right:-14px;top:50%;transform:translateY(-50%);width:14px;height:2.5px;background:var(--mint-deep)}
  .tab:hover{transform:translateX(-3px);background:var(--mint-pale)}
  .tab.active{background:var(--mint-pale);box-shadow:inset 0 0 0 1px var(--mint-deep)}
  @media(max-width:768px){.page{grid-template-columns:1fr;padding:0 10px}.rail{position:static;padding-top:8px}.rail-inner{padding:0;display:flex;overflow-x:auto;gap:8px;padding-bottom:6px}.rail-inner::before{display:none}.tab{margin:0;width:auto;flex:none;padding:8px 14px;font-size:14px}.tab::after{display:none}}
</style>
</head>
<body>

<div class="main">

      <div class="skeleton-row"><div class="skel skel-sm" style="width:75%"></div><div class="skel" style="width:70%"></div><div class="skel skel-badge" style="margin:0 auto"></div><div class="skel skel-stars" style="margin:0 auto"></div><div class="skel skel-sm" style="width:50%"></div><div class="skel skel-sm" style="width:40%;margin:0 auto"></div></div>
      <div class="skeleton-row"><div class="skel skel-sm" style="width:60%"></div><div class="skel" style="width:85%"></div><div class="skel skel-badge" style="margin:0 auto"></div><div class="skel skel-stars" style="margin:0 auto"></div><div class="skel skel-sm" style="width:70%"></div><div class="skel skel-sm" style="width:40%;margin:0 auto"></div></div>
      <div class="skeleton-row"><div class="skel skel-sm" style="width:65%"></div><div class="skel" style="width:60%"></div><div class="skel skel-badge" style="margin:0 auto"></div><div class="skel skel-stars" style="margin:0 auto"></div><div class="skel skel-sm" style="width:0%"></div><div class="skel skel-sm" style="width:40%;margin:0 auto"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://xnknkqvmqntxdwcsqmbj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhua25rcXZtcW50eGR3Y3NxbWJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDkwOTYsImV4cCI6MjA5NjgyNTA5Nn0.p_zgPHCauTsSZW24l1XlZxeHrCZzmir0ALSqsrQ-wSc';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const GENRE_LABELS = {
    kpop:'Kpop', jpop:'Jpop', pop:'Pop', indie:'인디', folk:'포크', etc:'기타'
  };

  let allSongs = [];
  let currentGenre = 'all';
  let currentSearch = '';

  async function loadSongs() {
    try {
      const { data, error } = await sb
        .from('songs')
        .select('*')
        .order('sort_order', { ascending: true })
        .order('artist', { ascending: true });

      document.getElementById('loading-state').style.display = 'none';

      if (error) throw error;
      allSongs = data || [];
      render();
    } catch(e) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
    }
  }

  function genreClass(g) {
    const map = { kpop:'genre-kpop', jpop:'genre-jpop', pop:'genre-pop', indie:'genre-indie', folk:'genre-folk' };
    return map[g] || 'genre-etc';
  }

  function starsHTML(n) {
    const count = Math.min(Math.max(parseInt(n)||0, 0), 5);
    let s = '<span class="stars">';
    for (let i=1;i<=5;i++) s += `<span class="star ${i<=count?'star-on':'star-off'}">${i<=count?'★':'☆'}</span>`;
    s += '</span>';
    return s;
  }

  const PAGE_SIZE = 23;
  let currentPage = 1;

  function render() {
    const q = currentSearch.trim().toLowerCase();
    const filtered = allSongs.filter(s => {
      const genreOk = currentGenre === 'all' || s.genre === currentGenre;
      const searchOk = !q || (s.artist||'').toLowerCase().includes(q) || (s.title||'').toLowerCase().includes(q);
      return genreOk && searchOk;
    });

    const tbody = document.getElementById('song-tbody');
    const emptyEl = document.getElementById('empty-state');
    const noResEl = document.getElementById('no-result-state');

    document.getElementById('count-badge').textContent = `${allSongs.length} 곡`;

    if (allSongs.length === 0) {
      emptyEl.style.display = 'block'; noResEl.style.display = 'none';
      tbody.innerHTML = ''; renderPagination(0); return;
    }
    emptyEl.style.display = 'none';

    if (filtered.length === 0) {
      noResEl.style.display = 'block'; tbody.innerHTML = ''; renderPagination(0); return;
    }
    noResEl.style.display = 'none';

    // 페이지네이션
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * PAGE_SIZE;
    const paged = filtered.slice(start, start + PAGE_SIZE);
    renderPagination(totalPages);

    tbody.innerHTML = paged.map(s => `
      <tr>
        <td class="artist-cell">${s.artist || '—'}</td>
        <td class="title-cell">${s.title || '—'}</td>
        <td class="center">
          <span class="genre-badge ${genreClass(s.genre)}">${GENRE_LABELS[s.genre]||s.genre||'기타'}</span>
        </td>
        <td class="center">${starsHTML(s.level)}</td>
        <td class="memo-cell">${s.memo || ''}</td>
        <td class="center">
          <button class="copy-btn" onclick="copyTitle(this, '${(s.artist||'').replace(/'/g,"\\'")} - ${(s.title||'').replace(/'/g,"\\'")}')">복사</button>
        </td>
      </tr>
    `).join('');
  }

  function renderPagination(totalPages) {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }

    let btns = '';
    btns += `<button class="page-btn arrow" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">‹</button>`;

    const delta = 2;
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || (i >= currentPage-delta && i <= currentPage+delta)) {
        btns += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      } else if (i === currentPage-delta-1 || i === currentPage+delta+1) {
        btns += `<span style="padding:0 4px;color:var(--gray-400)">…</span>`;
      }
    }
    btns += `<button class="page-btn arrow" ${currentPage===totalPages?'disabled':''} onclick="goPage(${currentPage+1})">›</button>`;
    el.innerHTML = btns;
  }

  function goPage(n) {
    currentPage = n;
    render();
    document.querySelector('.table-wrap')?.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function copyTitle(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
    });
  }

  // 검색
  document.getElementById('search-input').addEventListener('input', e => {
    currentSearch = e.target.value;
    currentPage = 1;
    render();
  });

  // 장르 필터
  document.getElementById('filter-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentGenre = tab.dataset.genre;
    currentPage = 1;
    render();
  });

  loadSongs();

  function songbookRandom() {
    if (!allSongs.length) return;
    const visible = allSongs.filter(s => {
      const genreOk = currentGenre === 'all' || s.genre === currentGenre;
      const q = currentSearch.trim().toLowerCase();
      const searchOk = !q || (s.artist||'').toLowerCase().includes(q) || (s.title||'').toLowerCase().includes(q);
      return genreOk && searchOk;
    });
    if (!visible.length) return;
    const song = visible[Math.floor(Math.random() * visible.length)];
    const GENRE_MAP2 = { kpop:'Kpop', jpop:'Jpop', pop:'Pop', indie:'인디', folk:'포크', etc:'기타' };

    const old = document.getElementById('randModal'); if(old) old.remove();
    const modal = document.createElement('div');
    modal.id = 'randModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:999';
    modal.innerHTML = `
      <div style="background:var(--white);border-radius:20px;padding:28px 24px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);position:fixed;top:300px;left:50%;transform:translateX(-50%)">
        <div style="font-size:36px;margin-bottom:10px">🎲</div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">${GENRE_MAP2[song.genre]||song.genre||'기타'}</div>
        <div style="font-size:14px;color:var(--mint-deep);font-weight:600;margin-bottom:4px">${song.artist||''}</div>
        <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px">${song.title||''}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px">${song.memo||''}</div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button onclick="navigator.clipboard.writeText('${(song.artist||'').replace(/'/g,"\'")} - ${(song.title||'').replace(/'/g,"\'")}').then(()=>{document.getElementById('randModal').remove()})"
            style="padding:9px 16px;background:var(--mint-dark);color:white;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">복사</button>
          <button onclick="document.getElementById('randModal').remove();songbookRandom()"
            style="padding:9px 16px;background:var(--lavender-light);color:#5B4BA8;border:1.5px solid var(--lavender);border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">다시 뽑기</button>
          <button onclick="document.getElementById('randModal').remove()"
            style="padding:9px 14px;background:var(--gray-100);color:var(--text-muted);border:1px solid var(--gray-200);border-radius:10px;font-size:12px;cursor:pointer;font-family:inherit">닫기</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  }
</script>
</div><!--/page-->
</body>
</html>
