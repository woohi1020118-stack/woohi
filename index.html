<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<title>우히 · SOOP</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --blue:#0455dc;        /* 메인 브랜드 (테두리·강조) */
    --blue-bright:#1599f0; /* 청량한 블루 (눈색·액센트) */
    --blue-mid:#4d8bf0;
    --blue-soft:#a9cdf7;
    --blue-pale:#eaf2ff;   /* 카드 채움 */
    --blue-wash:#f4f8ff;   /* 페이지 틴트 */
    --white:#ffffff;
    --ink:#1c2433;
    --muted:#6b7280;
    --line:#d8e6ff;
    --maxw:900px;          /* 기준 폭 (히어로 = 컨테이너 폭) */
    --rail:150px;          /* 우측 내비 영역 */
  }

  html{scroll-behavior:smooth}
  body{
    font-family:'Pretendard',system-ui,sans-serif;
    color:var(--ink);
    background:var(--white);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* ─── 손그림 박스 모티브 ─── */
  .hand{
    border:2.5px solid var(--blue);
    border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
    background:var(--white);
  }
  .hand:nth-of-type(2n){border-radius:15px 225px 15px 255px/225px 15px 255px 15px}
  .hand:nth-of-type(3n){border-radius:225px 15px 255px 15px/15px 255px 15px 225px}

  /* ─── 레이아웃 ─── */
  .page{
    max-width:1130px;
    margin:0 auto;
    padding:48px 24px 80px;
    display:grid;
    grid-template-columns:1fr var(--rail);
    gap:32px;
    align-items:start;
  }
  .main{max-width:var(--maxw);min-width:0}

  /* ─── 헤더 (이름 + soop 뱃지) ─── */
  .id-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .id-icon{width:40px;height:40px;flex:none}
  .id-name{font-size:38px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
  .soop-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--blue-pale);color:var(--blue);
    font-weight:700;font-size:17px;
    padding:7px 16px;border-radius:999px;text-decoration:none;
    transition:background .2s,transform .2s;
  }
  .soop-badge:hover{background:#dcebff;transform:translateY(-1px)}
  .soop-badge svg{width:15px;height:15px}

  /* ─── 히어로 (사진 + 정보) ─── */
  .hero{display:grid;grid-template-columns:300px 1fr;gap:40px;align-items:center;margin-bottom:44px}
  .portrait{
    width:280px;height:280px;border-radius:50%;
    border:4px solid var(--blue-bright);
    box-shadow:0 0 0 8px rgba(21,153,240,.12),0 18px 40px rgba(4,85,220,.18);
    object-fit:cover;display:block;background:var(--blue-pale);
  }
  .facts{display:flex;flex-direction:column;gap:13px;font-size:17px}
  .fact{display:flex;gap:8px;flex-wrap:wrap}
  .fact b{color:var(--blue);font-weight:700;flex:none}
  .fact span{color:#333}

  /* ─── 정보 카드 그리드 ─── */
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .card{
    padding:22px 14px;text-align:center;
    display:flex;flex-direction:column;gap:7px;
    transition:transform .2s,box-shadow .2s;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(4,85,220,.12)}
  .card .lbl{font-size:15px;font-weight:700;color:var(--blue)}
  .card .val{font-size:17px;font-weight:600;color:var(--ink);white-space:pre-line}

  /* ─── 우측 세로 탭 내비 ─── */
  .rail{
    position:fixed;right:calc((100vw - 1130px)/2);top:24px;
    width:136px;z-index:40;
  }
  .rail-inner{position:relative;padding-right:14px}
  .rail-inner::before{
    content:'';position:absolute;top:-10px;bottom:-10px;right:0;
    width:2.5px;background:var(--blue);border-radius:2px;
  }
  .tab{
    display:block;margin:0 0 14px auto;width:108px;text-align:center;
    padding:11px 0;font-size:18px;font-weight:800;color:var(--blue);
    text-decoration:none;background:var(--white);position:relative;
    border:2.5px solid var(--blue);
    border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
    transition:transform .18s,background .18s;
  }
  .tab:nth-child(2n){border-radius:15px 225px 15px 255px/225px 15px 255px 15px}
  .tab:nth-child(3n){border-radius:225px 15px 255px 15px/15px 255px 15px 225px}
  .tab::after{
    content:'';position:absolute;right:-14px;top:50%;transform:translateY(-50%);
    width:14px;height:2.5px;background:var(--blue);
  }
  .tab:hover{transform:translateX(-3px);background:var(--blue-wash)}
  .tab.active{background:var(--blue-pale);box-shadow:inset 0 0 0 1px var(--blue)}

  /* ─── 푸터 ─── */
  footer{
    grid-column:1/-1;margin-top:56px;padding-top:22px;
    border-top:1px solid var(--line);text-align:center;
    font-size:12px;color:var(--muted);
  }
  footer .credit{margin-top:6px;font-size:11px;color:var(--gray-400,#bbb)}
  footer .credit strong{color:#888}
  footer .credit a{color:#bbb;text-decoration:none;transition:color .2s}
  footer .credit a:hover{color:var(--blue-bright)}

  /* ─── 반응형 ─── */
  @media (max-width:880px){
    .hero{grid-template-columns:1fr;justify-items:center;text-align:center;gap:24px}
    .facts{align-items:center}
    .id-row{justify-content:center}
    .cards{grid-template-columns:repeat(2,1fr)}
  }
  @media (max-width:768px){
    .page{grid-template-columns:1fr;padding:20px 16px 60px}
    .rail{position:fixed;right:0;left:0;top:auto;bottom:0;width:100%;transform:none;display:flex;justify-content:center;background:#fff;border-top:2px solid #0455dc;padding:8px 16px 10px;z-index:40}
    .rail-inner{padding:0;display:flex;overflow-x:auto;gap:10px;}
    .rail-inner::before{display:none}
    .tab{margin:0;width:auto;flex:none;padding:9px 16px;font-size:15px}
    .tab::after{display:none}
    .id-name{font-size:30px}
    .portrait{width:200px;height:200px}
  }
</style>
</head>
<body>
<div class="page">

  <!-- 메인 -->
  <div class="main">

    <!-- 이름 + soop -->
    <div class="id-row">
      <svg class="id-icon" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" rx="8" fill="#0455dc"/>
        <circle cx="16" cy="17" r="8" fill="#fff"/>
        <path d="M9 8l3 5M23 8l-3 5" stroke="#1599f0" stroke-width="3" stroke-linecap="round"/>
        <rect x="10" y="14.5" width="5" height="3.4" rx="1.7" fill="none" stroke="#1599f0" stroke-width="1.4"/>
        <rect x="17" y="14.5" width="5" height="3.4" rx="1.7" fill="none" stroke="#1599f0" stroke-width="1.4"/>
        <path d="M15 16h2" stroke="#1599f0" stroke-width="1.4"/>
      </svg>
      <span class="id-name">우히</span>
      <a class="soop-badge" href="https://www.sooplive.com/station/1020118" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm-1 5h2v6l4 2-1 1.8L11 14V7z"/></svg>
        soop우히
      </a>
    </div>

    <!-- 히어로 -->
    <section class="hero">
      <img class="portrait" src="assets/profile.jpg" alt="우히 프로필">
      <div class="facts">
        <div class="fact"><b>시그니처</b><span>화이트(White) &amp; 청량한 블루(Blue)</span></div>
        <div class="fact"><b>모티브</b><span>바다의 토끼라 불리는 '바다민달팽이'</span></div>
        <div class="fact"><b>게임</b><span>매콤한편</span></div>
        <div class="fact"><b>분위기</b><span>구수</span></div>
      </div>
    </section>

    <!-- 정보 카드 -->
    <section class="cards">
      <div class="card hand"><span class="lbl">나이</span><span class="val">비공개</span></div>
      <div class="card hand"><span class="lbl">데뷔</span><span class="val">25.12.13</span></div>
      <div class="card hand"><span class="lbl">생일</span><span class="val">01.18</span></div>
      <div class="card hand"><span class="lbl">MBTI</span><span class="val">ISTP</span></div>
      <div class="card hand"><span class="lbl">방송시간</span><span class="val">오전 8:00</span></div>
      <div class="card hand"><span class="lbl">컨텐츠</span><span class="val">게임&amp;소통</span></div>
      <div class="card hand"><span class="lbl">팬애칭</span><span class="val">국밥</span></div>
      <div class="card hand"><span class="lbl">팬닉</span><span class="val">~히히</span></div>
    </section>

  </div>

  <!-- 우측 세로 탭 -->
  <nav class="rail" aria-label="페이지 내비게이션">
    <div class="rail-inner">
      <a class="tab active" href="index.html">프로필</a>
      <a class="tab" href="schedule.html">일정</a>
      <a class="tab" href="songbook/index.html">노래</a>
      <a class="tab" href="dress/index.html">옷장</a>
      <a class="tab" href="upbo/index.html">업보</a>
    </div>
  </nav>

  <footer>
    <p>© 2026 우히 · SOOP</p>
    <p class="credit">Designed &amp; Developed by <strong>아키텍트 크리에이티브</strong> ·
      <a href="mailto:profile@soop.info">profile@soop.info</a></p>
  </footer>

</div>
</body>
</html>
